---
# Execute remediation on the affected host based on AI recommendation.
# Only runs when rca_auto_remediation_safe is true OR after human approval.
# Updates the ServiceNow ticket with remediation outcome on completion.

- name: Remediate affected host
  hosts: "{{ target_host | default('all') }}"
  gather_facts: true
  become: true

  vars:
    snow_instance: "{{ lookup('env', 'SNOW_INSTANCE') }}"
    snow_username: "{{ lookup('env', 'SNOW_USERNAME') }}"
    snow_password: "{{ lookup('env', 'SNOW_PASSWORD') }}"
    snow_api_base: "https://{{ snow_instance }}.service-now.com/api/now/table"

  tasks:
    # --- Node Unreachable / Service Down ---
    - name: Check and restart failed services
      when: metric in ['node unreachable', 'service down']
      block:
        - name: Identify failed systemd services
          ansible.builtin.service_facts:

        - name: Restart any failed services
          ansible.builtin.service:
            name: "{{ item.key }}"
            state: restarted
          loop: "{{ ansible_facts.services | dict2items | selectattr('value.state', '==', 'failed') | list }}"
          register: service_restart_result
          ignore_errors: true

        - name: Record service restart outcomes
          ansible.builtin.set_fact:
            remediation_notes: >
              Restarted failed services:
              {{ service_restart_result.results
                 | selectattr('changed', 'equalto', true)
                 | map(attribute='item.key') | join(', ') | default('none') }}

    # --- High CPU ---
    - name: Handle high CPU utilization
      when: metric == 'high cpu'
      block:
        - name: Identify top CPU-consuming processes
          ansible.builtin.command:
            cmd: "ps aux --sort=-%cpu | awk 'NR>1 && $3>80 {print $2, $11}' | head -5"
          register: high_cpu_procs
          changed_when: false

        - name: Log processes for human review (no auto-kill in demo)
          ansible.builtin.set_fact:
            remediation_notes: >
              High CPU processes identified (human review required before termination):
              {{ high_cpu_procs.stdout | default('none above threshold') }}

    # --- Disk Full ---
    - name: Handle disk full condition
      when: metric == 'disk full'
      block:
        - name: Find and remove files older than 30 days in /tmp
          ansible.builtin.find:
            paths: /tmp
            age: 30d
            recurse: true
          register: old_tmp_files

        - name: Remove stale temp files
          ansible.builtin.file:
            path: "{{ item.path }}"
            state: absent
          loop: "{{ old_tmp_files.files }}"

        - name: Record cleanup result
          ansible.builtin.set_fact:
            remediation_notes: "Removed {{ old_tmp_files.matched }} stale files from /tmp."

    # --- Default: log that no automated action matched ---
    - name: No automated remediation path matched
      when: metric not in ['node unreachable', 'service down', 'high cpu', 'disk full']
      ansible.builtin.set_fact:
        remediation_notes: >
          No automated remediation playbook matched metric '{{ metric }}'.
          Manual intervention required per RCA steps:
          {{ rca_remediation_steps | default([]) | join(' | ') }}

    - name: Display remediation outcome
      ansible.builtin.debug:
        msg: "Remediation complete on {{ inventory_hostname }}: {{ remediation_notes }}"

    - name: Update ServiceNow ticket with remediation outcome
      ansible.builtin.uri:
        url: "{{ snow_api_base }}/incident/{{ snow_ticket_sys_id }}"
        method: PATCH
        user: "{{ snow_username }}"
        password: "{{ snow_password }}"
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
          Accept: "application/json"
        body_format: json
        body:
          work_notes: |
            Ansible automated remediation completed on {{ inventory_hostname }}.
            {{ remediation_notes }}
            Completed at: {{ ansible_date_time.iso8601 }}
          state: "{{ '6' if (remediation_notes is defined and 'Manual' not in remediation_notes) else '2' }}"
        status_code: 200
        timeout: 30
      delegate_to: localhost
      when: snow_ticket_sys_id is defined

    - name: Pass remediation result to workflow
      ansible.builtin.set_stats:
        data:
          remediation_notes: "{{ remediation_notes | default('No action taken.') }}"
          remediation_host: "{{ inventory_hostname }}"
        per_host: false
