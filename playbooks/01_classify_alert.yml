---
# LLM Call #1 — Classifier
# Determines whether the incoming SolarWinds alert is actionable or noise and
# returns a recommended initial action.
# Output variable: classifier_result (keys: classification, confidence,
#   reason_codes, explanation, recommended_action)

- name: Classify SolarWinds alert using LLM
  hosts: localhost
  gather_facts: false

  vars:
    # Fallback to environment variables if secrets.yml does not define these.
    llm_api_endpoint: "{{ lookup('env', 'LLM_API_ENDPOINT') | default('https://litellm-prod.apps.maas.redhatworkshops.io/v1', true) }}"
    llm_api_token: "{{ lookup('env', 'LLM_API_TOKEN') | default(lookup('env', 'OPENAI_API_KEY') | default(lookup('env', 'API_KEY'), true), true) }}"
    llm_model: "{{ llm_model_name | default('granite-3-2-8b-instruct') }}"

    # Alert fields — expected from EDA extra_vars. Defaults are empty so the
    # assert below catches missing vars with a clear message instead of a
    # cryptic "undefined variable" failure inside call_model.yml.
    event_source: "{{ event_source | default('') }}"
    alert_name: "{{ alert_name | default('') }}"
    object_type: "{{ object_type | default('') }}"
    environment: "{{ environment | default('') }}"
    criticality: "{{ criticality | default('') }}"
    metric: "{{ metric | default('') }}"
    duration_minutes: "{{ duration_minutes | default(0) }}"
    history: "{{ history | default('') }}"
    maintenance_window: "{{ maintenance_window | default(false) }}"
    corroboration: "{{ corroboration | default([]) }}"
    related_alerts_count: "{{ related_alerts_count | default(0) }}"
    time_of_day: "{{ time_of_day | default('') }}"
    additional_context: "{{ additional_context | default('') }}"

  # Expose secrets as OS environment variables so that any script or command
  # task in this play (e.g. callmodel.py, cmdb_agent.py, Trigger_SW.py) can
  # read them via os.environ without extra plumbing.
  environment:
    OPENAI_API_KEY: "{{ llm_api_token }}"
    API_KEY: "{{ llm_api_token }}"
    LLM_API_ENDPOINT: "{{ llm_api_endpoint }}"
    TRIGGER_SW_WEBHOOK_URL: "{{ eda_webhook_url | default('') }}"
    TRIGGER_SW_AUTH: "{{ eda_webhook_token | default('') }}"

  pre_tasks:
    - name: Load secrets from vars/secrets.yml
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../vars/secrets.yml"
      no_log: true

    - name: Assert required secrets are present and non-empty
      ansible.builtin.assert:
        that:
          - llm_api_token is defined
          - llm_api_token | length > 0
          - llm_api_token != 'CHANGEME'
          - llm_api_endpoint is defined
          - llm_api_endpoint | length > 0
        fail_msg: >
          vars/secrets.yml is missing or still contains placeholder values.
          Set llm_api_token and llm_api_endpoint before running this playbook.
        quiet: true

    - name: Assert required alert fields arrived from EDA extra_vars
      ansible.builtin.assert:
        that:
          - alert_name | length > 0
          - object_type | length > 0
          - environment | length > 0
          - criticality | length > 0
          - metric | length > 0
        fail_msg: >
          One or more required alert fields are empty or missing.
          Check that the EDA rulebook extra_vars are mapped correctly and that
          the AAP job template has 'Prompt on launch' enabled for Extra Variables.
        quiet: true

  tasks:
    - name: Run LLM classifier (tasks/call_model.yml)
      ansible.builtin.include_tasks: tasks/call_model.yml

    - name: Display classifier decision
      ansible.builtin.debug:
        msg: >
          Classification: {{ classifier_result.classification }}
          (confidence: {{ classifier_result.confidence }}%) |
          Action: {{ classifier_result.recommended_action }} |
          Reason: {{ classifier_result.explanation }}

    - name: Set stats for downstream workflow steps
      ansible.builtin.set_stats:
        data:
          classification: "{{ classifier_result.classification }}"
          recommended_action: "{{ classifier_result.recommended_action }}"
          classifier_confidence: "{{ classifier_result.confidence }}"
          classifier_reason_codes: "{{ classifier_result.reason_codes }}"
          classifier_explanation: "{{ classifier_result.explanation }}"
