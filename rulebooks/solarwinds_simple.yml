---
- name: SolarWinds Simple Debug - EDA Rulebook
  hosts: all
  sources:
    - ansible.eda.pg_listener:
        dsn: "{{ eda_pg_dsn }}"
        channels:
          - solarwinds

  rules:

    - name: Classify SolarWinds event via job template
      condition: event.payload is defined
      action:
        run_job_template:
          name: "mbredeme - classify solarwindsai event"
          organization: "Infrastructure"
          post_events: true
          job_args:
            extra_vars:
              event_source: "{{ event.payload.source }}"
              event_uuid: "{{ event.meta.uuid }}"
              alert_name: "{{ event.payload.alert.alert_name }}"
              object_type: "{{ event.payload.alert.object_type }}"
              alert_environment: "{{ event.payload.alert.environment }}"
              criticality: "{{ event.payload.alert.criticality }}"
              metric: "{{ event.payload.alert.metric }}"
              duration_minutes: "{{ event.payload.alert.duration_minutes }}"
              history: "{{ event.payload.alert.history }}"
              maintenance_window: "{{ event.payload.alert.maintenance_window }}"
              corroboration: "{{ event.payload.alert.corroboration }}"
              related_alerts_count: "{{ event.payload.alert.related_alerts_count }}"
              time_of_day: "{{ event.payload.alert.time_of_day }}"
              additional_context: "{{ event.payload.alert.additional_context }}"

    - name: Notify ignored alert via Mattermost
      condition: >
        event.classification is defined and
        event.classification == "ignore"
      action:
        run_job_template:
          name: "Notify Mattermost"
          organization: "Infrastructure"
          job_args:
            extra_vars:
              alert_title: "IGNORED: {{ event.alert_name }} | {{ event.event_source }}"
              alert_issue_value: "Classification: {{ event.classification }} | Confidence: {{ event.classifier_confidence }}%"
              alert_details_value: "{{ event.classifier_explanation }} | Recommended Action: {{ event.recommended_action }}"

    - name: Launch triage workflow for actionable or needs-review alerts
      condition: >
        event.classification is defined and
        (event.classification == "actionable_nonurgent" or
         event.classification == "actionable_urgent" or
         event.classification == "needs_review")
      action:
        run_workflow_template:
          name: "SW AI - Alert Triage and Remediation"
          organization: "Infrastructure"
          job_args:
            extra_vars:
              classification: "{{ event.classification }}"
              recommended_action: "{{ event.recommended_action }}"
              classifier_confidence: "{{ event.classifier_confidence }}"
              classifier_explanation: "{{ event.classifier_explanation }}"
              classifier_reason_codes: "{{ event.classifier_reason_codes }}"
              event_source: "{{ event.event_source }}"
              alert_name: "{{ event.alert_name }}"
